<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f5f3ef">
    <meta name="description" content="Offline-first tracker for the Aleph with Beth Hebrew learning schedule">
    <title>Aleph with Beth Tracker</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234a7c8c' width='100' height='100' rx='20'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='50' font-family='serif'>א</text></svg>">
    <style>
        :root {
            --bg: #f5f3ef;
            --card-bg: #ffffff;
            --card-border: #e8e4dd;
            --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
            --text-primary: #1e1e1e;
            --text-secondary: #6b6b6b;
            --text-muted: #9a9a9a;
            --accent: #4a7c8c;
            --accent-light: #e8f0f3;
            --accent-dark: #385f6b;
            --success: #6b9b7a;
            --success-light: #eaf4ed;
            --duration-bg: #f0ebe0;
            --duration-text: #8b7355;
            --link-color: #4a7c8c;
            --divider: #eeeae4;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            --transition-fast: 150ms ease;
            --transition-smooth: 300ms cubic-bezier(0.4,0,0.2,1);
            --max-width: 720px;
            --input-bg: #faf9f7;
            --input-border: #d0ccc4;
            --input-focus: #4a7c8c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh; min-height: 100dvh;
            padding-bottom: env(safe-area-inset-bottom,20px);
        }
        .app-container { max-width: var(--max-width); margin: 0 auto; padding: 16px 16px 40px; }
        .app-header {
            position: sticky; top: 0; z-index: 100; background: var(--bg);
            padding: 16px 0 10px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid transparent; transition: border-color var(--transition-fast);
        }
        .app-header.scrolled { border-bottom-color: var(--card-border); }
        .header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .app-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
        .app-title .hebrew-char {
            display: inline-flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; background: var(--accent); color: #fff;
            border-radius: var(--radius-sm); font-size: 1.4rem; font-weight: 500; flex-shrink: 0;
        }
        .sync-status { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; transition: background var(--transition-fast); }
        .sync-dot.offline { background: #d4a76a; }
        .sync-dot.syncing { background: #4a7c8c; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.4;} }
        .total-progress-section { margin-top: 10px; display: flex; align-items: center; gap: 10px; }
        .total-progress-bar-outer { flex: 1; height: 6px; background: var(--card-border); border-radius: 3px; overflow: hidden; }
        .total-progress-bar-inner { height: 100%; background: var(--success); border-radius: 3px; transition: width var(--transition-smooth); width: 0%; }
        .total-progress-label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); min-width: 44px; text-align: right; font-variant-numeric: tabular-nums; font-family: var(--font-mono); }
        .main-content { margin-top: 12px; }
        .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; color: var(--text-secondary); }
        .loading-spinner { width: 36px; height: 36px; border: 3px solid var(--card-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to{transform:rotate(360deg);} }
        .error-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; color: var(--text-secondary); }
        .retry-btn { margin-top: 16px; padding: 10px 24px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background var(--transition-fast); }
        .retry-btn:hover { background: var(--accent-dark); }

        .week-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius-lg); box-shadow: var(--card-shadow); margin-bottom: 16px; overflow: hidden; transition: box-shadow var(--transition-smooth); }
        .week-card:hover { box-shadow: var(--card-shadow-hover); }
        .week-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; gap: 12px; transition: background var(--transition-fast); }
        .week-header:hover { background: #fafaf8; }
        .week-title-group { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .week-icon { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; background: var(--accent-light); color: var(--accent); font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
        .week-title { font-size: 1.05rem; font-weight: 600; }
        .week-progress-badge { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); background: #f8f7f5; padding: 4px 10px; border-radius: 20px; white-space: nowrap; font-variant-numeric: tabular-nums; font-family: var(--font-mono); }
        .week-progress-badge.complete { background: var(--success-light); color: var(--success); }
        .week-chevron { width: 22px; height: 22px; color: var(--text-muted); transition: transform var(--transition-smooth); flex-shrink: 0; }
        .week-card.expanded .week-chevron { transform: rotate(180deg); }
        .week-metadata { padding: 0 18px 4px; font-size: 0.78rem; color: var(--text-muted); font-style: italic; }
        .week-body-wrapper { display: grid; grid-template-rows: 0fr; transition: grid-template-rows var(--transition-smooth); }
        .week-card.expanded .week-body-wrapper { grid-template-rows: 1fr; }
        .week-body-inner { overflow: hidden; }
        .week-body-content { padding: 0 18px 16px; border-top: 1px solid var(--divider); }

        .day-section { margin-top: 10px; border: 1px solid #f0ede7; border-radius: var(--radius-md); overflow: hidden; }
        .day-section:first-child { margin-top: 12px; }
        .day-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; background: #fafaf8; gap: 8px; transition: background var(--transition-fast); }
        .day-header:hover { background: #f5f3ef; }
        .day-title-group { display: flex; align-items: center; gap: 8px; flex: 1; }
        .day-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); transition: background var(--transition-fast); }
        .day-dot.complete { background: var(--success); }
        .day-title { font-size: 0.9rem; font-weight: 600; }
        .day-progress-mini { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); font-family: var(--font-mono); }
        .day-progress-mini.complete { color: var(--success); }
        .day-chevron { width: 18px; height: 18px; color: var(--text-muted); transition: transform var(--transition-smooth); flex-shrink: 0; }
        .day-section.expanded .day-chevron { transform: rotate(180deg); }
        .day-body-wrapper { display: grid; grid-template-rows: 0fr; transition: grid-template-rows var(--transition-smooth); }
        .day-section.expanded .day-body-wrapper { grid-template-rows: 1fr; }
        .day-body-inner { overflow: hidden; }
        .day-body-content { padding: 6px 14px 12px; }
        .day-metadata { font-size: 0.75rem; color: var(--text-muted); font-style: italic; padding: 2px 0 6px; margin-top: 4px; border-top: 1px dotted var(--divider); }

        .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; transition: opacity var(--transition-smooth); }
        .task-item.completed { opacity: 0.55; }
        .task-item.completed .task-text { text-decoration: line-through; text-decoration-color: var(--text-muted); text-decoration-thickness: 1px; }
        .task-checkbox-wrap { flex-shrink: 0; padding-top: 1px; }
        .task-checkbox { appearance: none; width: 20px; height: 20px; border: 2px solid #d0ccc4; border-radius: 4px; cursor: pointer; background: #fff; transition: all var(--transition-fast); position: relative; }
        .task-checkbox:hover { border-color: var(--accent); background: var(--accent-light); }
        .task-checkbox:checked { background: var(--success); border-color: var(--success); }
        .task-checkbox:checked::after { content:''; position: absolute; left: 5px; top: 2px; width: 6px; height: 10px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); animation: checkPop 0.25s cubic-bezier(0.18,0.89,0.32,1.28); }
        @keyframes checkPop { 0%{transform:rotate(45deg)scale(0);}60%{transform:rotate(45deg)scale(1.3);}100%{transform:rotate(45deg)scale(1);} }
        .task-content { flex: 1; min-width: 0; line-height: 1.5; }
        .task-text { font-size: 0.88rem; color: var(--text-primary); word-break: break-word; display: inline; }
        .task-text a { color: var(--link-color); text-decoration: underline; text-underline-offset: 2px; transition: color var(--transition-fast); }
        .task-text a:hover { color: var(--accent-dark); }
        .task-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
        .task-duration-badge { font-size: 0.7rem; font-weight: 600; background: var(--duration-bg); color: var(--duration-text); padding: 2px 8px; border-radius: 10px; font-family: var(--font-mono); }
        .task-link-badge { font-size: 0.7rem; font-weight: 500; background: #eef5f7; color: var(--accent); padding: 2px 8px; border-radius: 10px; text-decoration: none; }
        .task-link-badge:hover { background: #dde9ed; }
        .task-quiz-badge { font-size: 0.7rem; font-weight: 500; background: #fdf4e8; color: #b8783b; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }

        /* Fillable blank styling */
        .fillable-input {
            display: inline-block;
            width: auto;
            min-width: 2.5em;
            max-width: 4em;
            padding: 0 2px;
            font-size: inherit;
            font-family: inherit;
            color: var(--text-primary);
            background: var(--input-bg);
            border: none;
            border-bottom: 2px dashed var(--input-border);
            border-radius: 2px;
            text-align: center;
            transition: border-color var(--transition-fast), background var(--transition-fast);
            outline: none;
            margin: 0 2px;
            vertical-align: baseline;
        }
        .fillable-input:focus {
            background: #ffffff;
            border-bottom-color: var(--input-focus);
            box-shadow: 0 1px 0 0 rgba(74,124,140,0.3);
        }
        .fillable-input::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
            font-style: italic;
        }

        @media (max-width:480px) {
            .app-container { padding: 10px 10px 32px; }
            .app-title { font-size: 1.25rem; }
            .week-header { padding: 12px 14px; }
            .week-body-content { padding: 0 14px 12px; }
            .day-header { padding: 8px 10px; }
            .day-body-content { padding: 4px 10px 8px; }
            .task-text { font-size: 0.82rem; }
            .task-checkbox { width: 18px; height: 18px; }
            .task-checkbox:checked::after { left: 4px; top: 1px; width: 5px; height: 9px; }
        }
        @media print {
            body { background:#fff; }
            .app-header { position:static; border-bottom:1px solid #ccc; }
            .week-card { box-shadow:none; border:1px solid #ddd; break-inside:avoid; }
            .week-body-wrapper { grid-template-rows:1fr!important; }
            .day-body-wrapper { grid-template-rows:1fr!important; }
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <header class="app-header" id="appHeader">
        <div class="header-top">
            <h1 class="app-title"><span class="hebrew-char">א</span> Aleph with Beth Tracker</h1>
            <span class="sync-status" id="syncStatus"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">Ready</span></span>
        </div>
        <div class="total-progress-section" id="totalProgressSection">
            <div class="total-progress-bar-outer"><div class="total-progress-bar-inner" id="totalProgressBar" style="width:0%;"></div></div>
            <span class="total-progress-label" id="totalProgressLabel">0%</span>
        </div>
    </header>
    <main class="main-content" id="mainContent">
        <div class="loading-state" id="loadingState"><div class="loading-spinner"></div><p>Loading your learning schedule&hellip;</p></div>
    </main>
</div>
<script>
(function() {
    const CONFIG = {
        lessonsFile: './lessons.md',
        storageKey: 'aleph-beth-task-states',  // now stores objects { checked, values }
        cacheName: 'aleph-beth-v1',
        debounceMs: 300,
    };

    let dom = {};
    function cacheDomReferences() {
        dom.appContainer = document.getElementById('appContainer');
        dom.appHeader = document.getElementById('appHeader');
        dom.mainContent = document.getElementById('mainContent');
        dom.loadingState = document.getElementById('loadingState');
        dom.totalProgressBar = document.getElementById('totalProgressBar');
        dom.totalProgressLabel = document.getElementById('totalProgressLabel');
        dom.syncDot = document.getElementById('syncDot');
        dom.syncLabel = document.getElementById('syncLabel');
        dom.syncStatus = document.getElementById('syncStatus');
        dom.totalProgressSection = document.getElementById('totalProgressSection');
    }

    function generateTaskId(weekTitle, dayTitle, taskText) {
        const composite = `${weekTitle}::${dayTitle}::${taskText.trim()}`;
        let hash = 0;
        for (let i = 0; i < composite.length; i++) {
            const char = composite.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash |= 0;
        }
        return 'task-' + Math.abs(hash).toString(36);
    }

    function convertMarkdownLinksToHtml(text) {
        return text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
            '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    }

    function extractDuration(text) {
        const match = text.match(/\((\d{1,3}:\d{2})\)/);
        return match ? match[1] : null;
    }

    function extractLinks(text) {
        const links = [];
        const regex = /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g;
        let match;
        while ((match = regex.exec(text)) !== null) {
            links.push({ text: match[1], url: match[2] });
        }
        return links;
    }

    function isQuizTask(text) {
        return /quiz|i got\s*_+%/i.test(text);
    }

    // Count blanks (_____) in a task text to create fillable fields
    function countBlanks(text) {
        const matches = text.match(/_{2,}/g);
        return matches ? matches.length : 0;
    }

    function debounce(fn, delay) {
        let timer;
        return function(...args) {
            clearTimeout(timer);
            timer = setTimeout(() => fn.apply(this, args), delay);
        };
    }

    // Storage: now saves objects { checked: boolean, values: string[] } per task
    function loadTaskStates() {
        try {
            const raw = localStorage.getItem(CONFIG.storageKey);
            if (!raw) return {};
            const data = JSON.parse(raw);
            // Migrate old format (just boolean) to new format
            const migrated = {};
            for (const [id, val] of Object.entries(data)) {
                if (typeof val === 'boolean') {
                    migrated[id] = { checked: val, values: [] };
                } else if (val && typeof val.checked === 'boolean') {
                    // ensure values is an array
                    migrated[id] = { checked: val.checked, values: Array.isArray(val.values) ? val.values : [] };
                } else {
                    // fallback
                    migrated[id] = { checked: false, values: [] };
                }
            }
            return migrated;
        } catch (e) {
            console.warn('Failed to load task states:', e);
            return {};
        }
    }

    const saveTaskStates = debounce(function(states) {
        try {
            localStorage.setItem(CONFIG.storageKey, JSON.stringify(states));
        } catch (e) {
            console.warn('Failed to save task states:', e);
        }
    }, CONFIG.debounceMs);

    function setCheckboxState(taskId, checked) {
        const states = loadTaskStates();
        if (!states[taskId]) states[taskId] = { checked: false, values: [] };
        states[taskId].checked = checked;
        try {
            localStorage.setItem(CONFIG.storageKey, JSON.stringify(states));
        } catch (e) {}
    }

    function setBlankValue(taskId, blankIndex, value) {
        const states = loadTaskStates();
        if (!states[taskId]) states[taskId] = { checked: false, values: [] };
        if (!Array.isArray(states[taskId].values)) states[taskId].values = [];
        states[taskId].values[blankIndex] = value;
        try {
            localStorage.setItem(CONFIG.storageKey, JSON.stringify(states));
        } catch (e) {}
    }

    // Parser
    function parseLessons(markdown) {
        const lines = markdown.split('\n');
        const weeks = [];
        let currentWeek = null;
        let currentDay = null;
        let pendingMetadata = null;

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            const trimmed = line.trim();

            if (trimmed === '') {
                if (pendingMetadata && currentDay) {
                    currentDay.metadata = (currentDay.metadata ? currentDay.metadata + ' ' : '') + pendingMetadata;
                    pendingMetadata = null;
                } else if (pendingMetadata && currentWeek && !currentDay) {
                    currentWeek.metadata = (currentWeek.metadata ? currentWeek.metadata + ' ' : '') + pendingMetadata;
                    pendingMetadata = null;
                }
                continue;
            }

            const weekMatch = trimmed.match(/^#{1,2}\s+Week\s+(\d+)\s*$/i);
            if (weekMatch) {
                if (pendingMetadata && currentWeek) {
                    currentWeek.metadata = (currentWeek.metadata ? currentWeek.metadata + ' ' : '') + pendingMetadata;
                    pendingMetadata = null;
                }
                const weekNum = parseInt(weekMatch[1], 10);
                currentWeek = { id: 'week-'+weekNum, title: 'Week '+weekNum, weekNumber: weekNum, metadata: null, days: [] };
                currentDay = null;
                weeks.push(currentWeek);
                continue;
            }

            const dayMatch = trimmed.match(/^###\s+Day\s+(\d+)\s*$/i);
            if (dayMatch && currentWeek) {
                if (pendingMetadata && currentDay) {
                    currentDay.metadata = (currentDay.metadata ? currentDay.metadata + ' ' : '') + pendingMetadata;
                    pendingMetadata = null;
                }
                const dayNum = parseInt(dayMatch[1], 10);
                currentDay = { id: currentWeek.id+'-day-'+dayNum, title: 'Day '+dayNum, dayNumber: dayNum, metadata: null, tasks: [] };
                currentWeek.days.push(currentDay);
                continue;
            }

            if (trimmed.startsWith('>')) {
                const metaText = trimmed.replace(/^>\s*/, '').trim();
                if (metaText) pendingMetadata = metaText;
                continue;
            }

            const taskMatch = trimmed.match(/^-\s+\[(\s|x)\]\s+(.+)$/);
            if (taskMatch && currentDay) {
                if (pendingMetadata) {
                    currentDay.metadata = (currentDay.metadata ? currentDay.metadata + ' ' : '') + pendingMetadata;
                    pendingMetadata = null;
                }
                const isChecked = taskMatch[1] === 'x';
                const rawText = taskMatch[2].trim();
                const duration = extractDuration(rawText);
                const links = extractLinks(rawText);
                const quizFlag = isQuizTask(rawText);
                const blankCount = countBlanks(rawText);
                const taskId = generateTaskId(currentWeek.title, currentDay.title, rawText);
                currentDay.tasks.push({
                    id: taskId,
                    rawText, displayText: rawText,
                    checked: isChecked,
                    duration, links, isQuiz: quizFlag,
                    blankCount
                });
                continue;
            }

            if (pendingMetadata && currentDay) {
                currentDay.metadata = (currentDay.metadata ? currentDay.metadata + ' ' : '') + pendingMetadata;
                pendingMetadata = null;
            }
        }
        if (pendingMetadata && currentDay) {
            currentDay.metadata = (currentDay.metadata ? currentDay.metadata + ' ' : '') + pendingMetadata;
        } else if (pendingMetadata && currentWeek && !currentDay) {
            currentWeek.metadata = (currentWeek.metadata ? currentWeek.metadata + ' ' : '') + pendingMetadata;
        }
        return weeks;
    }

    // Rendering
    let collapseState = { weeks: {}, days: {} };

    function renderApp(weeksData, savedStates) {
        dom.mainContent.innerHTML = '';
        if (!weeksData || weeksData.length === 0) {
            dom.mainContent.innerHTML = `<div class="error-state"><div class="error-icon">📭</div><p>No learning schedule data found.</p><p style="font-size:0.85rem;color:var(--text-muted);">Please ensure <code>lessons.md</code> exists and contains valid data.</p><button class="retry-btn" onclick="location.reload()">Retry</button></div>`;
            updateTotalProgress(weeksData, savedStates);
            return;
        }
        weeksData.forEach(week => {
            if (!(week.id in collapseState.weeks)) collapseState.weeks[week.id] = true;
            week.days.forEach(day => {
                if (!(day.id in collapseState.days)) collapseState.days[day.id] = true;
            });
        });
        weeksData.forEach(week => {
            const el = buildWeekElement(week, savedStates);
            dom.mainContent.appendChild(el);
        });
        updateTotalProgress(weeksData, savedStates);
        attachScrollListener();
    }

    function buildWeekElement(week, savedStates) {
        const isExpanded = collapseState.weeks[week.id] !== false;
        const wp = calculateProgress(week, savedStates);
        const card = document.createElement('div');
        card.className = 'week-card' + (isExpanded ? ' expanded' : '');
        card.setAttribute('data-week-id', week.id);
        let html = '';
        html += '<div class="week-header" data-action="toggle-week" data-week-id="'+week.id+'">';
        html += '<div class="week-title-group"><span class="week-icon">'+week.weekNumber+'</span><span class="week-title">'+escapeHtml(week.title)+'</span></div>';
        html += '<span class="week-progress-badge'+(wp.percent>=100?' complete':'')+'">'+wp.completed+'/'+wp.total+' done</span>';
        html += '<svg class="week-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>';
        html += '</div>';
        if (week.metadata) html += '<div class="week-metadata">'+escapeHtml(week.metadata)+'</div>';
        html += '<div class="week-body-wrapper"><div class="week-body-inner"><div class="week-body-content">';
        week.days.forEach(day => { html += buildDayHtml(day, savedStates); });
        html += '</div></div></div>';
        card.innerHTML = html;
        attachWeekEventListeners(card, week);
        return card;
    }

    function buildDayHtml(day, savedStates) {
        const isExpanded = collapseState.days[day.id] !== false;
        const dp = calculateDayProgress(day, savedStates);
        let html = '<div class="day-section'+(isExpanded?' expanded':'')+'" data-day-id="'+day.id+'">';
        html += '<div class="day-header" data-action="toggle-day" data-day-id="'+day.id+'">';
        html += '<div class="day-title-group"><span class="day-dot'+(dp.percent>=100?' complete':'')+'"></span><span class="day-title">'+escapeHtml(day.title)+'</span></div>';
        html += '<span class="day-progress-mini'+(dp.percent>=100?' complete':'')+'">'+dp.completed+'/'+dp.total+'</span>';
        html += '<svg class="day-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>';
        html += '</div>';
        html += '<div class="day-body-wrapper"><div class="day-body-inner"><div class="day-body-content">';
        day.tasks.forEach(task => { html += buildTaskHtml(task, savedStates); });
        if (day.metadata) html += '<div class="day-metadata">'+escapeHtml(day.metadata)+'</div>';
        html += '</div></div></div></div>';
        return html;
    }

    function buildTaskHtml(task, savedStates) {
        const state = savedStates[task.id] || { checked: task.checked, values: [] };
        const isChecked = state.checked;
        const savedValues = state.values || [];
        let displayText = task.displayText;
        // Split by blanks (_____)
        const blankSegments = displayText.split(/_{2,}/);
        let textHtml = '';
        blankSegments.forEach((seg, idx) => {
            textHtml += convertMarkdownLinksToHtml(escapeHtml(seg));
            if (idx < blankSegments.length - 1) {
                const value = savedValues[idx] || '';
                // Create an inline input for the blank
                textHtml += `<input class="fillable-input" data-blank-index="${idx}" data-task-id="${task.id}" placeholder="%" value="${escapeHtml(value)}">`;
            }
        });

        let html = '<div class="task-item'+(isChecked?' completed':'')+'" data-task-id="'+task.id+'">';
        html += '<span class="task-checkbox-wrap"><input type="checkbox" class="task-checkbox" data-task-id="'+task.id+'" '+(isChecked?'checked':'')+'></span>';
        html += '<div class="task-content"><span class="task-text">'+textHtml+'</span>';
        html += '<div class="task-badges">';
        if (task.duration) html += '<span class="task-duration-badge">⏱ '+escapeHtml(task.duration)+'</span>';
        if (task.isQuiz) html += '<span class="task-quiz-badge">📝 Quiz</span>';
        task.links.forEach(link => {
            html += '<a href="'+escapeHtml(link.url)+'" target="_blank" rel="noopener" class="task-link-badge">🔗 '+escapeHtml(link.text)+'</a>';
        });
        html += '</div></div></div>';
        return html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function attachWeekEventListeners(card, week) {
        card.querySelector('.week-header')?.addEventListener('click', function(e) {
            if (e.target.closest('a')) return;
            toggleWeekCollapse(week.id, card);
        });
        card.querySelectorAll('.day-header').forEach(dh => {
            dh.addEventListener('click', function(e) {
                if (e.target.closest('a')) return;
                const dayId = dh.getAttribute('data-day-id');
                const sec = dh.closest('.day-section');
                if (dayId && sec) toggleDayCollapse(dayId, sec);
            });
        });
        card.querySelectorAll('.task-checkbox').forEach(cb => {
            cb.addEventListener('change', function() { handleCheckboxChange(cb); });
        });
        // Listen for fillable input changes
        card.querySelectorAll('.fillable-input').forEach(inp => {
            inp.addEventListener('input', function() {
                handleBlankInput(inp);
            });
            // also handle change for paste etc.
            inp.addEventListener('change', function() {
                handleBlankInput(inp);
            });
        });
    }

    function handleBlankInput(inputEl) {
        const taskId = inputEl.getAttribute('data-task-id');
        const blankIndex = parseInt(inputEl.getAttribute('data-blank-index'), 10);
        setBlankValue(taskId, blankIndex, inputEl.value);
    }

    function toggleWeekCollapse(weekId, card) {
        const expanded = card.classList.contains('expanded');
        if (expanded) { card.classList.remove('expanded'); collapseState.weeks[weekId] = false; }
        else { card.classList.add('expanded'); collapseState.weeks[weekId] = true; }
    }

    function toggleDayCollapse(dayId, sec) {
        const expanded = sec.classList.contains('expanded');
        if (expanded) { sec.classList.remove('expanded'); collapseState.days[dayId] = false; }
        else { sec.classList.add('expanded'); collapseState.days[dayId] = true; }
    }

    function handleCheckboxChange(cb) {
        const taskId = cb.getAttribute('data-task-id');
        const checked = cb.checked;
        const taskItem = cb.closest('.task-item');
        if (taskItem) {
            if (checked) taskItem.classList.add('completed');
            else taskItem.classList.remove('completed');
        }
        setCheckboxState(taskId, checked);
        refreshAllProgress();
    }

    function calculateProgress(week, savedStates) {
        let total=0, completed=0;
        week.days.forEach(day => {
            day.tasks.forEach(task => {
                total++;
                const state = savedStates[task.id] || { checked: task.checked };
                if (state.checked) completed++;
            });
        });
        return { total, completed, percent: total>0?Math.round(completed/total*100):0 };
    }

    function calculateDayProgress(day, savedStates) {
        let total=0, completed=0;
        day.tasks.forEach(task => {
            total++;
            const state = savedStates[task.id] || { checked: task.checked };
            if (state.checked) completed++;
        });
        return { total, completed, percent: total>0?Math.round(completed/total*100):0 };
    }

    function updateTotalProgress(weeksData, savedStates) {
        let total=0, completed=0;
        if (weeksData) {
            weeksData.forEach(week => {
                const wp = calculateProgress(week, savedStates);
                total += wp.total; completed += wp.completed;
            });
        }
        const percent = total>0?Math.round(completed/total*100):0;
        dom.totalProgressBar.style.width = percent+'%';
        dom.totalProgressLabel.textContent = percent+'%';
        dom.totalProgressSection.style.display = total>0?'flex':'none';
    }

    function refreshAllProgress() {
        const states = loadTaskStates();
        const weeksData = window._currentWeeksData;
        if (!weeksData) return;
        updateTotalProgress(weeksData, states);
        weeksData.forEach(week => {
            const card = document.querySelector('[data-week-id="'+week.id+'"]');
            if (!card) return;
            const wp = calculateProgress(week, states);
            const badge = card.querySelector('.week-progress-badge');
            if (badge) {
                badge.textContent = wp.completed+'/'+wp.total+' done';
                badge.classList.toggle('complete', wp.percent>=100);
            }
            week.days.forEach(day => {
                const sec = card.querySelector('[data-day-id="'+day.id+'"]');
                if (!sec) return;
                const dp = calculateDayProgress(day, states);
                const mini = sec.querySelector('.day-progress-mini');
                const dot = sec.querySelector('.day-dot');
                if (mini) {
                    mini.textContent = dp.completed+'/'+dp.total;
                    mini.classList.toggle('complete', dp.percent>=100);
                }
                if (dot) dot.classList.toggle('complete', dp.percent>=100);
            });
        });
    }

    function attachScrollListener() {
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                requestAnimationFrame(() => {
                    dom.appHeader.classList.toggle('scrolled', window.scrollY > 8);
                    ticking = false;
                });
                ticking = true;
            }
        }, { passive: true });
    }

    async function fetchLessonsMarkdown() {
        const resp = await fetch(CONFIG.lessonsFile, { headers: { 'Cache-Control': 'no-cache' } });
        if (!resp.ok) throw new Error('Failed to fetch lessons.md');
        return await resp.text();
    }

    function updateSyncStatus(status) {
        const dot = dom.syncDot;
        dot.classList.remove('offline','syncing');
        switch (status) {
            case 'online': dot.style.background='var(--success)'; dom.syncLabel.textContent='Online'; break;
            case 'offline': dot.classList.add('offline'); dom.syncLabel.textContent='Offline'; break;
            case 'syncing': dot.classList.add('syncing'); dom.syncLabel.textContent='Syncing…'; break;
        }
    }

    function isOnline() { return navigator.onLine !== false; }

    async function registerServiceWorker() {
        if (!('serviceWorker' in navigator)) { updateSyncStatus(isOnline()?'online':'offline'); return; }
        try {
            const reg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
            reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker?.addEventListener('statechange', () => {
                    if (newWorker.state==='installed' && navigator.serviceWorker.controller) console.log('New SW ready.');
                });
            });
            if (reg.waiting) reg.waiting.postMessage({ type:'SKIP_WAITING' });
            updateSyncStatus(isOnline()?'online':'offline');
        } catch(e) { console.error('SW reg failed', e); updateSyncStatus(isOnline()?'online':'offline'); }
    }

    async function initApp() {
        cacheDomReferences();
        updateSyncStatus('syncing');
        const swPromise = registerServiceWorker();
        const savedStates = loadTaskStates();
        try {
            const md = await fetchLessonsMarkdown();
            const weeksData = parseLessons(md);
            window._currentWeeksData = weeksData;
            renderApp(weeksData, savedStates);
            updateSyncStatus(isOnline()?'online':'offline');
        } catch(err) {
            console.error('Failed to load lessons:', err);
            dom.mainContent.innerHTML = `<div class="error-state"><div class="error-icon">📡</div><p>Unable to load schedule.</p><p style="font-size:0.85rem;color:var(--text-muted);">${isOnline()?'<code>lessons.md</code> missing?':'Offline and no cache. Connect and retry.'}</p><button class="retry-btn" onclick="location.reload()">Retry</button></div>`;
            updateTotalProgress(null, savedStates);
            updateSyncStatus(isOnline()?'online':'offline');
        }
        await swPromise;
    }

    window.addEventListener('online', () => {
        updateSyncStatus('online');
        fetchLessonsMarkdown().then(md => {
            const weeksData = parseLessons(md);
            if (JSON.stringify(weeksData) !== JSON.stringify(window._currentWeeksData)) {
                window._currentWeeksData = weeksData;
                renderApp(weeksData, loadTaskStates());
            }
        }).catch(() => {});
    });
    window.addEventListener('offline', () => updateSyncStatus('offline'));

    navigator.serviceWorker?.addEventListener('message', (e) => {
        if (e.data?.type==='CACHE_UPDATED') console.log('Cache updated:', e.data.url);
    });

    if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', initApp);
    else initApp();
})();
</script>
</body>
</html>
